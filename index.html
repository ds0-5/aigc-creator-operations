<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIGC创作者运营驾驶舱</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <!-- 外部样式 -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ============================================================ -->
    <!-- 顶部导航栏 -->
    <!-- ============================================================ -->
    <header class="dashboard-header">
        <div class="logo-area">
            <span class="logo-icon">🚀</span>
            <span class="logo-text">创作者驾驶舱</span>
            <span class="logo-badge">v1.0</span>
        </div>
        <div class="header-right">
            <span class="update-time">📅 更新：2026-06-17</span>
            <div class="view-switcher">
                <button class="view-btn active" data-view="weekly" onclick="switchView('weekly')">📊 周</button>
                <button class="view-btn" data-view="monthly" onclick="switchView('monthly')">📈 月</button>
            </div>
            <span class="data-source">模拟数据演示</span>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- 主内容区 -->
    <!-- ============================================================ -->
    <main class="dashboard-main">

        <!-- 第一行：4个核心指标卡片 -->
        <section class="kpi-row" id="kpiRow">
            <!-- 由 JavaScript 动态渲染 -->
        </section>

        <!-- 第二行：左(分层图) + 右(趋势图) -->
        <section class="charts-row">
            <div class="chart-card" id="layerChartCard">
                <h3 class="chart-title">📊 创作者分层</h3>
                <div class="chart-wrapper">
                    <canvas id="layerChart"></canvas>
                </div>
                <p class="chart-note">头部10%贡献了42%的优质内容</p>
            </div>
            <div class="chart-card" id="trendChartCard">
                <h3 class="chart-title">📈 近7天产出趋势</h3>
                <div class="chart-wrapper">
                    <canvas id="trendChart"></canvas>
                </div>
                <p class="chart-note">环比上周 ↑ 8.7%</p>
            </div>
        </section>

        <!-- 第三行：预警列表 + 快速操作 -->
        <section class="bottom-row">
            <div class="alert-card" id="alertCard">
                <h3 class="chart-title">⚠️ 预警列表</h3>
                <div id="alertList">
                    <!-- 由 JavaScript 动态渲染 -->
                </div>
            </div>
            <div class="quick-actions">
                <button class="btn-primary" onclick="exportReport()">📄 导出周报</button>
                <button class="btn-secondary" onclick="refreshData()">🔄 刷新数据</button>
                <button class="btn-secondary" onclick="alert('⚙️ 指标配置功能开发中')">⚙️ 配置</button>
            </div>
        </section>

        <!-- ============================================================ -->
        <!-- 第四行：创作者明细列表 -->
        <!-- ============================================================ -->
        <section class="table-row">
            <div class="table-card">
                <div class="table-header">
                    <h3 class="chart-title">📋 创作者明细</h3>
                    <div class="table-filters">
                        <select id="filterLevel" onchange="applyFilters()">
                            <option value="all">全部层级</option>
                            <option value="head">头部</option>
                            <option value="mid">腰部</option>
                            <option value="tail">尾部</option>
                        </select>
                        <select id="filterStatus" onchange="applyFilters()">
                            <option value="all">全部状态</option>
                            <option value="active">活跃</option>
                            <option value="risky">有流失风险</option>
                            <option value="inactive">不活跃</option>
                        </select>
                        <button class="btn-secondary" onclick="exportCSV()">📥 导出CSV</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table id="creatorTable">
                        <thead>
                            <tr>
                                <th>创作者</th>
                                <th>层级</th>
                                <th>本周产出</th>
                                <th>互动率</th>
                                <th>状态</th>
                                <th>最后活跃</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 由 JavaScript 动态渲染 -->
                        </tbody>
                    </table>
                </div>
                <div class="table-footer">
                    <span id="tableStats">共 0 位创作者</span>
                </div>
            </div>
        </section>

    </main>

    <!-- ============================================================ -->
    <!-- 外部 JavaScript -->
    <!-- ============================================================ -->
    <script src="script.js"></script>

</body>

</html>
